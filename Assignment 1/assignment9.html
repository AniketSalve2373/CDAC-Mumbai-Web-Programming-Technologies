<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="style9.css">
</head>
<body>

<div class="contact-container">

<div class="left-side">
    <h2>Get in touch</h2>

    <div class="info">
        <p><strong>Name</strong><br>HTML CSS Tutorials</p>
        <p><strong>Email</strong><br>htmlcsstutorials@gmail.com</p>
        <p><strong>Phone</strong><br>+91 1234567890</p>
        <p><strong>Address</strong><br>123 Street, Bengaluru, India</p>
    </div>

    <div class="social">
        <span>f</span>
        <span>t</span>
        <span>i</span>
        <span>▶</span>
    </div>
</div>

<div class="right-side">
    <h2>Contact Us</h2>

    <form>

        <input type="text" placeholder="Full Name">

        <input type="email" placeholder="Email">

        <input type="text" placeholder="Website">

        <input type="text" placeholder="Contact Number">

        <select>
            <option>Select Subject</option>
            <option>Web Design</option>
            <option>Frontend</option>
            <option>Backend</option>
        </select>

        <div class="radio-box">
            <label><input type="radio" name="priority"> Normal</label>
            <label><input type="radio" name="priority"> Urgent</label>
        </div>

        <textarea placeholder="Message"></textarea>

        <button type="submit">Submit</button>

    </form>
</div>

</div>

</body>
</html>
