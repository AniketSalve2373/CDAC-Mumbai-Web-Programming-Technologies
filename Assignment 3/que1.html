<!DOCTYPE html>
<html>
<head>
    <title>Q1 DOM Manipulation</title>
</head>
<body>

<h2>Question 1</h2>

<p id="para">
It is rightly said that being disciplined is essential in life.
When a person leads a disciplined life, they set an easy path to success.
They will develop an approach to happiness and a beautiful future ahead.
</p>

<button onclick="changeStyle()">Submit</button>

<script>
function changeStyle()
{
    let p = document.getElementById("para");

    p.style.fontFamily = "Arial";
    p.style.fontSize = "24px";
    p.style.color = "blue";
    p.style.fontWeight = "bold";
}
</script>

</body>
</html>
