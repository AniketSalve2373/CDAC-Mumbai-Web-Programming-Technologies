<!DOCTYPE html>
<html>
<head>
    <title>Q4 Highlight Bold Words</title>
</head>
<body>

<h2>Question 4</h2>

<a href="#"
onmouseover="highlight()"
onmouseout="normal()">
[On mouse over here bold words of the following paragraph will be highlighted]
</a>

<p>
We have just started <b>this</b> section for the users
(<b>beginner</b> to intermediate) who <b>want</b> to work with
<b>various</b> JavaScript <b>problems</b> and write scripts online
to <b>test</b> their JavaScript <b>skill</b>.
</p>

<script>
function highlight()
{
    let boldWords = document.getElementsByTagName("b");

    for(let i=0; i<boldWords.length; i++)
    {
        boldWords[i].style.color = "green";
    }
}

function normal()
{
    let boldWords = document.getElementsByTagName("b");

    for(let i=0; i<boldWords.length; i++)
    {
        boldWords[i].style.color = "black";
    }
}
</script>

</body>
</html>
